<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrawSense - Reset Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 12% 18%, rgba(255, 199, 213, 0.95) 0, transparent 25%), radial-gradient(circle at 88% 15%, rgba(178, 235, 242, 0.95) 0, transparent 28%), linear-gradient(135deg, #fff3f8, #eefaff 45%, #fff7df);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 25px;
        }

        .page {
            width: 500px;
            background: rgba(255, 250, 253, 0.92);
            border-radius: 38px;
            padding: 45px 40px;
            box-shadow: 0 35px 90px rgba(255, 156, 184, 0.24);
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            text-align: center;
        }

        .logo-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-size: 26px;
            font-weight: 900;
            color: #4a3b78;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            color: #4a3b78;
            margin-bottom: 10px;
            font-weight: 900;
        }

        p {
            font-size: 14px;
            color: #6a5b88;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .card {
            background: linear-gradient(145deg, #6c63a8, #4a3b78);
            border-radius: 28px;
            padding: 30px 25px;
            color: white;
            box-shadow: 0 24px 42px rgba(74, 59, 120, 0.2);
        }

        input {
            width: 100%;
            height: 44px;
            border: none;
            outline: none;
            border-radius: 11px;
            margin-bottom: 15px;
            padding: 0 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 15px;
        }

            input::placeholder {
                color: rgba(255, 255, 255, 0.75);
            }

        .btn {
            width: 160px;
            height: 46px;
            border: none;
            border-radius: 26px;
            background: linear-gradient(135deg, #ffd166, #ffb5a7);
            color: #4a3b78;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 14px 26px rgba(255, 209, 102, 0.35);
            transition: 0.25s ease;
        }

            .btn:hover {
                transform: translateY(-3px);
            }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #6a5b88;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

            .back-link:hover {
                color: #ff8fab;
            }

        #alertMessage {
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="logo-box"><span>DrawSense</span></div>
        <h1>Reset Password</h1>
        <p id="stepDescription">Enter your email to receive a password reset code.</p>

        <div class="card">
            <div id="alertMessage" style="display: none;"></div>

            <form id="requestForm">
                <input id="reqEmail" type="email" placeholder="Enter your Email" required>
                <button type="submit" class="btn">SEND CODE</button>
            </form>

            <form id="resetForm" style="display: none;">
                <input id="resetCode" type="text" placeholder="6-Digit Reset Code" required maxlength="6">
                <input id="newPassword" type="password" placeholder="New Password" required>
                <button type="submit" class="btn">RESET NOW</button>
            </form>
        </div>
        <a href="index.html" class="back-link">← Back to Login</a>
    </main>

    <script>
        let userEmail = "";
        const alertBox = document.getElementById("alertMessage");
        const requestForm = document.getElementById("requestForm");
        const resetForm = document.getElementById("resetForm");
        const stepDescription = document.getElementById("stepDescription");

        function showAlert(text, color) {
            alertBox.style.display = "block";
            alertBox.style.color = color;
            alertBox.innerText = text;
        }

        // 1. طلب كود إعادة التعيين
        requestForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            userEmail = document.getElementById("reqEmail").value.trim();
            showAlert("Sending reset code...", "#ffd166");

            try {
                const response = await fetch(`https://drawsense.onrender.com/auth/forgot-password?email=${encodeURIComponent(userEmail)}`, {
                    method: "POST"
                });
                const data = await response.json();

                if (response.ok) {
                    showAlert("Code sent! Check your terminal/email.", "#7ddff8");
                    requestForm.style.display = "none";
                    resetForm.style.display = "block";
                    stepDescription.innerText = "Enter the code you received and your new password.";
                } else {
                    showAlert(data.detail || "Email not found.", "#ff8fab");
                }
            } catch (err) {
                showAlert("Server connection failed.", "#ff8fab");
            }
        });

        // 2. إرسال الكود والباسورد الجديد للباك إند
        resetForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            const code = document.getElementById("resetCode").value.trim();
            const newPassword = document.getElementById("newPassword").value.trim();
            showAlert("Updating password...", "#ffd166");

            try {
                const response = await fetch("https://drawsense.onrender.com/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: userEmail, code: code, new_password: newPassword })
                });
                const data = await response.json();

                if (response.ok) {
                    showAlert("Password reset successfully! Redirecting...", "#7ddff8");
                    setTimeout(() => { window.location.href = "index.html"; }, 2000);
                } else {
                    showAlert(data.detail || "Invalid code or expired.", "#ff8fab");
                }
            } catch (err) {
                showAlert("Server connection failed.", "#ff8fab");
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrawSense - AI Analysis Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 12% 18%, rgba(255, 199, 213, 0.4) 0, transparent 25%), radial-gradient(circle at 88% 15%, rgba(178, 235, 242, 0.4) 0, transparent 28%), linear-gradient(135deg, #fff3f8, #eefaff 45%, #fff7df);
            font-family: Arial, sans-serif;
            display: flex;
            overflow-x: hidden;
        }

        /* Sidebar Copy from Gallery */
        .sidebar {
            width: 90px;
            background: linear-gradient(145deg, #6c63a8, #4a3b78);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 30px 20px;
            gap: 25px;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
            box-shadow: 4px 0 35px rgba(74, 59, 120, 0.25);
            transition: width 0.4s cubic-bezier(0.05, 0.74, 0.2, 1.0);
            overflow: visible;
            white-space: nowrap;
        }

            .sidebar:hover {
                width: 240px;
            }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            width: 100%;
            padding: 12px 8px;
            border-radius: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

            .menu-item:hover {
                background: rgba(255, 255, 255, 0.12);
                transform: translateX(4px);
            }

        .menu-icon {
            color: white;
            font-size: 22px;
            display: inline-block;
            width: 35px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .menu-item:hover .menu-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .menu-text {
            color: white;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar:hover .menu-text {
            opacity: 1;
        }

        /* Main Content Specific for Details */
        .main-content {
            margin-left: 90px;
            flex: 1;
            width: calc(100% - 90px);
            padding: 45px 55px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            color: #4a3b78;
            border: 2px solid white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 900;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(74, 59, 120, 0.08);
        }

            .back-btn:hover {
                background: white;
                transform: translateX(-5px);
                box-shadow: 0 15px 30px rgba(74, 59, 120, 0.12);
                color: #7ddff8;
            }

        .details-wrapper {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(74, 59, 120, 0.08);
            border: 2px solid white;
            display: flex;
            gap: 50px;
            align-items: stretch;
        }

        .image-section {
            flex: 1;
            max-width: 45%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .image-container {
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            background: #f0f6f8;
            box-shadow: inset 0 5px 20px rgba(0,0,0,0.05);
            position: relative;
            border: 4px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

            .image-container img {
                width: 100%;
                height: auto;
                object-fit: cover;
                border-radius: 26px;
            }

        .drawing-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(74, 59, 120, 0.05);
        }

        .drawing-date {
            color: #8c7fa6;
            font-size: 14px;
            font-weight: bold;
        }

        .action-btns button {
            border: none;
            background: #f0f6f8;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            margin-left: 10px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .btn-fav {
            color: #ffd166;
        }

            .btn-fav.active {
                background: #ffd166;
                color: white;
                box-shadow: 0 8px 15px rgba(255, 209, 102, 0.4);
            }

        .btn-del {
            color: #ef4e7b;
        }

            .btn-del:hover {
                background: #ef4e7b;
                color: white;
                box-shadow: 0 8px 15px rgba(239, 78, 123, 0.4);
            }

        .analysis-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .analysis-header {
            margin-bottom: 25px;
        }

            .analysis-header h1 {
                font-size: 32px;
                color: #4a3b78;
                font-weight: 900;
                margin-bottom: 5px;
            }

            .analysis-header p {
                color: #6a5b88;
                font-size: 15px;
                font-weight: bold;
            }

        .analysis-content {
            background: linear-gradient(135deg, #ffffff, #f9fbfd);
            padding: 30px;
            border-radius: 30px;
            border: 2px solid #e1edf2;
            flex-grow: 1;
            box-shadow: 0 15px 35px rgba(74, 59, 120, 0.03);
            overflow-y: auto;
            color: #4a3b78;
            line-height: 1.8;
            font-size: 16px;
            font-weight: 600;
            white-space: pre-line; /* Essential for text formatting */
        }

        /* Loading Skeleton */
        .skeleton {
            background: #e1edf2;
            border-radius: 10px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .toast-notification {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background: #4a3b78;
            color: white;
            padding: 16px 32px;
            border-radius: 25px;
            box-shadow: 0 20px 45px rgba(74, 59, 120, 0.3);
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 0.5px;
            z-index: 1000;
            display: none;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                transform: translateY(60px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Modal for Delete Confirmation */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(53, 41, 95, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

            .modal-overlay.active {
                opacity: 1;
                pointer-events: auto;
            }

        .cozy-modal {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 38px;
            width: 420px;
            text-align: center;
            box-shadow: 0 35px 90px rgba(74, 59, 120, 0.3);
            border: 2px solid white;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .cozy-modal {
            transform: scale(1) translateY(0);
        }

        .cozy-modal h3 {
            color: #4a3b78;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .cozy-modal p {
            color: #6a5b88;
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .modal-btn {
            padding: 14px 30px;
            border-radius: 28px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            border: none;
            flex: 1;
            transition: all 0.3s;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #7ddff8, #8ec5fc);
            color: #4a3b78;
        }

        .btn-cancel {
            background: #f0f6f8;
            color: #6a5b88;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a class="menu-item" onclick="window.location.href='gallery.html'">
            <span class="menu-icon">🏠</span>
            <span class="menu-text">Home</span>
        </a>
        <a class="menu-item" onclick="window.location.href='ai-hub.html'">
            <span class="menu-icon">💡</span>
            <span class="menu-text">AI Analysis</span>
        </a>
        <a class="menu-item" onclick="window.location.href='favorites.html'">
            <span class="menu-icon">⭐</span>
            <span class="menu-text">Favorites</span>
        </a>
    </nav>

    <main class="main-content">
        <div class="header-area">
            <a href="gallery.html" class="back-btn">⬅️ Back to Gallery</a>
        </div>

        <div class="details-wrapper">
            <div class="image-section">
                <div class="image-container">
                    <div id="imageLoader" class="skeleton" style="width: 100%; height: 400px;"></div>
                    <img id="drawingImage" src="" alt="Drawing" style="display: none; width:100%; border-radius:26px;">
                </div>
                <div class="drawing-actions">
                    <span class="drawing-date" id="drawingDate">Loading Date...</span>
                    <div class="action-btns">
                        <button class="btn-fav" id="favBtn" onclick="toggleFavoriteCurrent()">⭐</button>
                        <button class="btn-del" onclick="openDeleteModal()">🗑️</button>
                    </div>
                </div>
            </div>

            <div class="analysis-section">
                <div class="analysis-header">
                    <h1 id="drawingTitle">Loading Title...</h1>
                    <p>AI Psychological & Creative Analysis 🧠✨</p>
                </div>
                <div class="analysis-content" id="analysisContent">
                    <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 15px;"></div>
                    <div class="skeleton" style="height: 20px; width: 90%; margin-bottom: 15px;"></div>
                    <div class="skeleton" style="height: 20px; width: 70%; margin-bottom: 15px;"></div>
                    <div class="skeleton" style="height: 20px; width: 85%; margin-bottom: 15px;"></div>
                    <br>
                    <div class="skeleton" style="height: 20px; width: 60%; margin-bottom: 15px;"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-notification" id="customToast"></div>

    <div class="modal-overlay" id="deleteModal">
        <div class="cozy-modal">
            <h3>Delete Artwork?</h3>
            <p>Are you sure you want to permanently delete this artwork and its analysis?</p>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn btn-confirm" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://drawsense.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
        const drawingId = urlParams.get('id');
        let currentDrawing = null;

        function showNotification(message, isSuccess = true) {
            const toast = document.getElementById("customToast");
            toast.innerText = message;
            toast.style.background = isSuccess ? "linear-gradient(135deg, #7ddff8, #8ec5fc)" : "linear-gradient(135deg, #ff9cb8, #ef4e7b)";
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3000);
        }

        async function loadDrawingDetails() {
            if (!drawingId) {
                window.location.href = "gallery.html";
                return;
            }

            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "index.html";
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/drawings/${drawingId}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (response.ok) {
                    currentDrawing = await response.json();

                    // تحديث الصورة
                    const imgElement = document.getElementById("drawingImage");
                    imgElement.src = `${BASE_URL}/${currentDrawing.image_url}`;
                    imgElement.onload = () => {
                        document.getElementById("imageLoader").style.display = "none";
                        imgElement.style.display = "block";
                    };

                    // تحديث النصوص
                    document.getElementById("drawingTitle").innerText = currentDrawing.title || "Untitled Artwork";

                    // تنسيق التاريخ إذا كان متوفراً
                    if(currentDrawing.created_at) {
                        const dateObj = new Date(currentDrawing.created_at);
                        document.getElementById("drawingDate").innerText = "Uploaded on " + dateObj.toLocaleDateString();
                    } else {
                        document.getElementById("drawingDate").innerText = "Recently Uploaded";
                    }

                    // تحديث حالة المفضلة
                    updateFavBtnUI(currentDrawing.is_favorite);

                    // تحديث نتيجة التحليل
                    const analysisText = currentDrawing.analysis_output || "لم يتم استخراج تحليل ذكي لهذه الرسمة بعد. جاري العمل على ربط محرك الذكاء الاصطناعي قريباً!";
                    document.getElementById("analysisContent").innerHTML = analysisText;

                } else {
                    showNotification("Artwork not found.", false);
                    setTimeout(() => window.location.href = "gallery.html", 2000);
                }
            } catch (error) {
                showNotification("Connection error.", false);
            }
        }

        function updateFavBtnUI(isFavorite) {
            const btn = document.getElementById("favBtn");
            if (isFavorite) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        }

        async function toggleFavoriteCurrent() {
            if (!currentDrawing) return;
            const token = localStorage.getItem("token");

            try {
                const response = await fetch(`${BASE_URL}/drawings/${currentDrawing.id}/toggle-favorite`, {
                    method: "PATCH",
                    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentDrawing.is_favorite = data.is_favorite;
                    updateFavBtnUI(currentDrawing.is_favorite);
                    showNotification(data.message, true);
                }
            } catch (error) {
                showNotification("Error toggling favorite.", false);
            }
        }

        function openDeleteModal() { document.getElementById("deleteModal").classList.add("active"); }
        function closeModal() { document.getElementById("deleteModal").classList.remove("active"); }

        async function confirmDelete() {
            if (!currentDrawing) return;
            const token = localStorage.getItem("token");

            try {
                const response = await fetch(`${BASE_URL}/drawings/${currentDrawing.id}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (response.ok) {
                    showNotification("Artwork deleted successfully!", true);
                    closeModal();
                    setTimeout(() => window.location.href = "gallery.html", 1000);
                }
            } catch (error) {
                showNotification("Error deleting artwork.", false);
            }
        }

        document.addEventListener("DOMContentLoaded", loadDrawingDetails);
    </script>
</body>
</html>

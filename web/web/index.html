<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrawSense - Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 12% 18%, rgba(255, 199, 213, 0.95) 0, transparent 25%), radial-gradient(circle at 88% 15%, rgba(178, 235, 242, 0.95) 0, transparent 28%), radial-gradient(circle at 82% 88%, rgba(255, 224, 178, 0.9) 0, transparent 25%), linear-gradient(135deg, #fff3f8, #eefaff 45%, #fff7df);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 25px;
            overflow-x: hidden;
        }

        .page {
            width: 1120px;
            min-height: 720px;
            position: relative;
            background: rgba(255, 250, 253, 0.92);
            border-radius: 38px;
            padding: 45px 50px;
            box-shadow: 0 35px 90px rgba(255, 156, 184, 0.24);
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

            .page::before {
                content: "";
                position: absolute;
                width: 430px;
                height: 430px;
                background: radial-gradient(circle, rgba(156, 220, 255, 0.35), transparent 65%);
                right: -120px;
                top: -120px;
                border-radius: 50%;
                z-index: 0;
            }

            .page::after {
                content: "";
                position: absolute;
                width: 380px;
                height: 380px;
                background: radial-gradient(circle, rgba(255, 184, 203, 0.35), transparent 65%);
                left: -120px;
                bottom: -120px;
                border-radius: 50%;
                z-index: 0;
            }

        .logo-container {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 900;
            color: #4a3b78;
        }

        .logo-shape span {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 7px;
            background: #ff8fab;
            box-shadow: 0 6px 15px rgba(255, 143, 171, 0.42);
        }

        .logo-shape {
            width: 34px;
            height: 34px;
            position: relative;
        }

            .logo-shape span:nth-child(1) {
                left: 0;
                top: 8px;
            }

            .logo-shape span:nth-child(2) {
                right: 4px;
                top: 2px;
                width: 10px;
                height: 10px;
                background: #7ddff8;
                box-shadow: 0 6px 15px rgba(125, 223, 248, 0.42);
            }

            .logo-shape span:nth-child(3) {
                right: 0;
                bottom: 3px;
                background: #ffd166;
                box-shadow: 0 6px 15px rgba(255, 209, 102, 0.42);
            }

        .content {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 400px 1fr;
            align-items: center;
            gap: 35px;
        }

        .tag {
            display: inline-block;
            background: linear-gradient(135deg, #ffd166, #ffb5a7);
            color: #4a3b78;
            padding: 9px 18px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 15px;
            box-shadow: 0 10px 22px rgba(255, 181, 167, 0.28);
        }

        .left h1 {
            font-size: 45px;
            line-height: 1.2;
            letter-spacing: 6px;
            font-weight: 900;
            text-transform: uppercase;
            color: #4a3b78;
            margin-bottom: 12px;
            text-shadow: 0 8px 25px rgba(255, 143, 171, 0.18);
        }

        .left p {
            font-size: 16px;
            letter-spacing: 1px;
            color: #6a5b88;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .login-card {
            width: 390px;
            background: linear-gradient(145deg, #6c63a8, #4a3b78);
            border-radius: 34px;
            padding: 30px 35px 25px;
            text-align: center;
            color: white;
            box-shadow: 0 24px 42px rgba(74, 59, 120, 0.28);
            position: relative;
            overflow: hidden;
        }

            .login-card::before {
                content: "";
                position: absolute;
                width: 190px;
                height: 190px;
                background: rgba(125, 223, 248, 0.22);
                border-radius: 50%;
                right: -70px;
                top: -70px;
            }

            .login-card::after {
                content: "";
                position: absolute;
                width: 150px;
                height: 150px;
                background: rgba(255, 143, 171, 0.22);
                border-radius: 50%;
                left: -65px;
                bottom: -65px;
            }

            .login-card h2, .login-card button, .login-card input, .login-card form, .forgot-link {
                position: relative;
                z-index: 2;
            }

            .login-card h2 {
                font-size: 21px;
                margin-bottom: 20px;
                letter-spacing: 0.5px;
            }

        .blue-btn {
            width: 255px;
            height: 50px;
            border: none;
            border-radius: 28px;
            background: linear-gradient(135deg, #7ddff8, #8ec5fc);
            color: #4a3b78;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 14px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(125, 223, 248, 0.32);
        }

        .login-card input {
            width: 100%;
            height: 42px;
            border: none;
            outline: none;
            border-radius: 11px;
            margin-bottom: 12px;
            padding: 0 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 15px;
        }

            .login-card input::placeholder {
                color: rgba(255, 255, 255, 0.78);
            }

        .forgot-link {
            display: block;
            margin: 4px 0 14px;
            text-align: right;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

            .forgot-link:hover {
                color: #7ddff8;
            }

        .login-btn {
            width: 135px;
            height: 46px;
            border: none;
            border-radius: 26px;
            background: linear-gradient(135deg, #ffd166, #ffb5a7);
            color: #4a3b78;
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 4px;
            cursor: pointer;
            box-shadow: 0 14px 26px rgba(255, 209, 102, 0.35);
        }

        .image-area {
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .image-glow {
            position: absolute;
            width: 570px;
            height: 430px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 143, 171, 0.18), transparent 35%), radial-gradient(circle, rgba(125, 223, 248, 0.28), transparent 65%);
            filter: blur(10px);
            z-index: 0;
        }

        .main-image {
            width: 100%;
            max-width: 560px;
            height: auto;
            display: block;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 35px 45px rgba(74, 59, 120, 0.18));
            animation: floatImage 4s ease-in-out infinite;
        }

        .info-card {
            position: absolute;
            left: 40px;
            bottom: 25px;
            z-index: 3;
            width: 175px;
            padding: 15px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 18px 35px rgba(255, 143, 171, 0.18);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

            .info-card strong {
                display: block;
                font-size: 24px;
                color: #ff8fab;
                margin-bottom: 5px;
            }

            .info-card span {
                font-size: 13px;
                color: #6a5b88;
                font-weight: 800;
            }

        .bubble {
            position: absolute;
            border-radius: 50%;
            z-index: 1;
            box-shadow: 0 12px 24px rgba(255, 143, 171, 0.18);
        }

            .bubble.one {
                width: 18px;
                height: 18px;
                background: #ffd166;
                top: 40px;
                left: 45px;
            }

            .bubble.two {
                width: 26px;
                height: 26px;
                background: #7ddff8;
                right: 50px;
                bottom: 65px;
            }

            .bubble.three {
                width: 14px;
                height: 14px;
                background: #ff8fab;
                right: 120px;
                top: 75px;
            }

        button {
            transition: 0.25s ease;
        }

            button:hover {
                transform: translateY(-3px) scale(1.02);
            }

        @keyframes floatImage {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @media (max-width: 900px) {
            .page {
                width: 100%;
                padding: 25px 20px;
            }

            .content {
                grid-template-columns: 1fr;
            }

            .left h1 {
                font-size: 36px;
                letter-spacing: 4px;
            }

            .login-card {
                width: 100%;
            }

            .image-area {
                min-height: auto;
                padding-top: 25px;
            }

            .info-card {
                display: none;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="content">
            <div class="logo-container">
                <div class="logo-box">
                    <div class="logo-shape">
                        <span></span><span></span><span></span>
                    </div>
                    <span>DrawSense</span>
                </div>
            </div>

            <div class="left">
                <span class="tag">CREATIVE KIDS PLATFORM</span>
                <h1>Discover Their<br>Imagination</h1>
                <p>Insights Through Every Doodle &amp; Sketch</p>

                <div class="login-card">
                    <h2>GET STARTED</h2>
                    <button type="button" class="blue-btn" onclick="window.location.href='signup.html'">PARENT SIGN UP</button>

                    <form id="loginForm">
                        <input id="loginEmail" name="email" type="email" placeholder="Email" required>
                        <input id="loginPassword" name="password" type="password" placeholder="Password" autocomplete="current-password" required>

                        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>

                        <div id="alertMessage" style="margin: 10px 0; font-size: 14px; font-weight: bold; display: none;"></div>

                        <button type="submit" class="login-btn">LOGIN</button>
                    </form>
                </div>
            </div>

            <div class="image-area">
                <div class="image-glow"></div>
                <span class="bubble one"></span>
                <span class="bubble two"></span>
                <span class="bubble three"></span>

                <img src="webimage.png" alt="DrawSense children drawings" class="main-image">

                <div class="info-card">
                    <strong>+120</strong>
                    <span>Creative drawings analyzed</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("token")) {
                window.location.href = "gallery.html";
            }
        });

        document.getElementById("loginForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            const alertBox = document.getElementById("alertMessage");

            alertBox.style.display = "none";

            try {
                const formData = new URLSearchParams();
                formData.append("username", email);
                formData.append("password", password);

                const response = await fetch("https://drawsense.onrender.com/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("token", data.access_token);
                    window.location.href = "gallery.html";
                } else {
                    alertBox.style.display = "block";
                    alertBox.style.color = "#ff8fab";
                    let errorMsg = "Invalid Email or Password!";
                    if (data.detail) {
                        if (Array.isArray(data.detail)) {
                            errorMsg = data.detail[0].msg;
                        } else {
                            errorMsg = data.detail;
                        }
                    }
                    alertBox.innerText = errorMsg;
                }
            } catch (error) {
                alertBox.style.display = "block";
                alertBox.style.color = "#ff8fab";
                alertBox.innerText = "Server Connection Failed.";
                console.error(error);
            }
        });
    </script>
</body>
</html>

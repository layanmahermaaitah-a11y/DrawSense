<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #dff4f8, #fff0d9);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 460px;
            padding: 40px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(80, 130, 150, 0.25);
            text-align: center;
        }

        h1 {
            color: #35295f;
            margin-bottom: 12px;
            font-size: 26px;
        }

        p {
            color: #666;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .code-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .code-input {
            width: 45px;
            height: 55px;
            border: 2px solid #e0e6e8;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #35295f;
            background: #f8fbfb;
            outline: none;
            transition: 0.2s;
        }

            .code-input:focus {
                border-color: #34c8bf;
                background: #ffffff;
                box-shadow: 0 0 10px rgba(52, 200, 191, 0.2);
            }

        button {
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            background: #ef4e7b;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(239, 78, 123, 0.2);
            transition: 0.2s;
        }

            button:hover {
                transform: translateY(-2px);
            }

        #alertBox {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Verify Your Email</h1>
        <p>We sent a 6-digit verification code to your email. Please enter it below to activate your account.</p>

        <form id="verifyForm">
            <div class="code-container">
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
            </div>

            <div id="alertBox"></div>
            <br>

            <button type="submit">Verify &amp; Activate</button>
        </form>
    </div>

    <script>
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        document.getElementById("verifyForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            let code = "";
            inputs.forEach(input => code += input.value);

            const alertBox = document.getElementById("alertBox");
            alertBox.style.display = "block";
            alertBox.style.color = "#34c8bf";
            alertBox.innerText = "Validating code...";

            const email = localStorage.getItem("pending_email");

            try {
                const response = await fetch("https://drawsense.onrender.com/auth/verify-code", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, code: code })
                });

                const data = await response.json();

                if (response.ok) {
                    alertBox.style.color = "green";
                    alertBox.innerText = "Account Activated Successfully!";
                    localStorage.removeItem("pending_email");
                    setTimeout(() => { window.location.href = "index.html"; }, 1500);
                } else {
                    alertBox.style.color = "#ef4e7b";

                    let errorMsg = "Invalid or expired code.";
                    if (data.detail) {
                        if (Array.isArray(data.detail)) {
                            errorMsg = data.detail[0].msg;
                        } else {
                            errorMsg = data.detail;
                        }
                    }
                    alertBox.innerText = errorMsg;
                }
            } catch (error) {
                alertBox.style.color = "#ef4e7b";
                alertBox.innerText = "Connection error.";
                console.error(error);
            }
        });
    </script>
</body>
</html>
